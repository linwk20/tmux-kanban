<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tmux Kanban</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
</head>
<body>
    <div class="topbar">
        <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')" title="Menu">&#9776;</button>
        <div class="topbar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="12" y1="9" x2="12" y2="21"/>
            </svg>
            <h1>Tmux Kanban</h1>
            <a href="https://github.com/linwk20/tmux-kanban" target="_blank" rel="noopener" class="topbar-github" title="GitHub">
                <svg viewBox="0 0 16 16" fill="currentColor" width="30" height="30"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                <span class="github-badge" id="github-stars">?? Stars</span>
            </a>
        </div>
        <button class="topbar-new-btn" onclick="showCreateSession()">+ New Session</button>
        <button class="topbar-new-btn" onclick="scanSessions(this)">Scan Sessions</button>
        <button class="topbar-new-btn" onclick="showSettings()">Settings</button>
        <button class="topbar-new-btn" onclick="updateApp(this)" title="Pull latest code from GitHub and reinstall">Update</button>
        <div class="topbar-stats">
            <div class="topbar-stat">
                <span class="dot dot-green"></span>
                <span id="stat-sessions">0</span> sessions
            </div>
            <div class="topbar-stat">
                <span class="dot dot-yellow"></span>
                <span id="stat-panes">0</span> panes
            </div>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-body" id="sidebar-body"></div>
            <div class="sidebar-footer">
                <button class="sidebar-add-btn" onclick="showManageProjects()">Manage Projects</button>
                <button class="sidebar-add-btn" onclick="showManageSessions()" style="margin-top:4px">Manage Sessions</button>
            </div>
        </div>
        <div class="sidebar-resize" id="sidebar-resize"></div>
        <div class="content-wrapper">
            <div class="content">
                <div class="kanban" id="kanban"></div>
            </div>

            <!-- Resize handle -->
            <div class="resize-handle" id="resize-handle"></div>

            <!-- Terminal side panel -->
            <div class="terminal-panel" id="terminal-panel">
                <div class="terminal-titlebar">
                    <span class="title-dot"></span>
                    <span class="title" id="panel-title"></span>
                    <button class="term-btn" onclick="copyTmuxBuffer(this)" title="Select text → release mouse → Alt+C to copy">Copy (Mouse Select → Release → Alt+C)</button>

                    <button class="term-btn" onclick="showDraftBox()" title="Draft to terminal (Alt+D)">Draft (Alt+D)</button>
                    <button class="term-btn" onclick="toggleFullscreen()" title="Fullscreen">&#x26F6;</button>
                    <button class="term-btn term-btn-close" onclick="closeTerminal()" title="Close">&#10005;</button>
                </div>
                <div class="terminal-body" id="panel-body"></div>
                <div class="draft-resize" id="draft-resize"></div>
                <div class="draft-bar" id="draft-bar">
                    <textarea id="draft-input" placeholder="Type or dictate here. Enter=send, ↑↓=history"></textarea>
                    <div class="draft-buttons">
                        <button class="draft-send-btn" onclick="sendDraftFromBar()">Send</button>
                        <button class="draft-send-btn draft-jump-btn" onclick="refreshTerminal()">Refresh &#8635;</button>
                        <button class="draft-send-btn draft-jump-btn" onclick="jumpToBottom()">Bottom &#8595;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Terminal fullscreen overlay -->
    <div class="terminal-overlay" id="terminal-overlay">
        <div class="terminal-container">
            <div class="terminal-titlebar">
                <span class="title-dot"></span>
                <span class="title" id="fs-title"></span>
                <button class="term-btn" onclick="copyTmuxBuffer(this)" title="Select text → release mouse → Alt+C to copy">Copy (Mouse Select → Release → Alt+C)</button>

                <button class="term-btn" onclick="showDraftBox()" title="Draft to terminal (Alt+D)">Draft (Alt+D)</button>
                <button class="term-btn" onclick="toggleFullscreen()" title="Side panel">&#x25a3;</button>
                <button class="term-btn term-btn-close" onclick="closeTerminal()">&#10005;</button>
            </div>
            <div class="terminal-body" id="fs-body"></div>
            <div class="draft-resize" id="draft-resize-fs"></div>
            <div class="draft-bar" id="draft-bar-fs">
                <textarea id="draft-input-fs" placeholder="Type or dictate here. Enter=send, ↑↓=history" rows="2"></textarea>
                <div class="draft-buttons">
                    <button class="draft-send-btn" onclick="sendDraftFromBar('fs')">Send</button>
                    <button class="draft-send-btn draft-jump-btn" onclick="refreshTerminal()">Refresh &#8635;</button>
                    <button class="draft-send-btn draft-jump-btn" onclick="jumpToBottom()">Bottom &#8595;</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
